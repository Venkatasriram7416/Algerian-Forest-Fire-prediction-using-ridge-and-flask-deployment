<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algerian Forest Fire FWI Prediction</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background-image: linear-gradient(
                    rgba(0, 0, 0, 0.65),
                    rgba(0, 0, 0, 0.65)
                ),
                url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: rgba(255, 255, 255, 0.93);
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
        }

        .title {
            text-align: center;
            margin-bottom: 10px;
            color: #1f3d1f;
            font-size: 32px;
            font-weight: bold;
        }

        .subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 30px;
            font-size: 16px;
        }

        form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .input-box {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 7px;
            font-weight: bold;
            color: #333;
        }

        input,
        select {
            padding: 12px;
            border: 1px solid #bbb;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus,
        select:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 6px rgba(46, 125, 50, 0.5);
        }

        .button-box {
            grid-column: span 2;
            text-align: center;
            margin-top: 15px;
        }

        button {
            padding: 14px 45px;
            border: none;
            border-radius: 30px;
            background: #2e7d32;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1b5e20;
            transform: scale(1.04);
        }

        .result {
            margin-top: 30px;
            text-align: center;
            padding: 18px;
            border-radius: 12px;
            background: #e8f5e9;
            color: #1b5e20;
            font-size: 22px;
            font-weight: bold;
            border: 2px solid #2e7d32;
        }

        .error {
            margin-top: 30px;
            text-align: center;
            padding: 18px;
            border-radius: 12px;
            background: #fdecea;
            color: #b71c1c;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #f44336;
        }

        @media (max-width: 700px) {
            form {
                grid-template-columns: 1fr;
            }

            .button-box {
                grid-column: span 1;
            }

            .title {
                font-size: 25px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1 class="title">Algerian Forest Fire Prediction</h1>
        <p class="subtitle">Enter weather and fire index values to predict FWI</p>

        <form action="{{ url_for('predict_datapoint') }}" method="post">

            <div class="input-box">
                <label>Temperature</label>
                <input type="number" step="any" name="Temperature" placeholder="Enter Temperature" required>
            </div>

            <div class="input-box">
                <label>Relative Humidity RH</label>
                <input type="number" step="any" name="RH" placeholder="Enter RH" required>
            </div>

            <div class="input-box">
                <label>Wind Speed Ws</label>
                <input type="number" step="any" name="Ws" placeholder="Enter Wind Speed" required>
            </div>

            <div class="input-box">
                <label>Rain</label>
                <input type="number" step="any" name="Rain" placeholder="Enter Rain value" required>
            </div>

            <div class="input-box">
                <label>FFMC</label>
                <input type="number" step="any" name="FFMC" placeholder="Enter FFMC" required>
            </div>

            <div class="input-box">
                <label>DMC</label>
                <input type="number" step="any" name="DMC" placeholder="Enter DMC" required>
            </div>

            <div class="input-box">
                <label>DC</label>
                <input type="number" step="any" name="DC" placeholder="Enter DC" required>
            </div>

            <div class="input-box">
                <label>ISI</label>
                <input type="number" step="any" name="ISI" placeholder="Enter ISI" required>
            </div>

            <div class="input-box">
                <label>BUI</label>
                <input type="number" step="any" name="BUI" placeholder="Enter BUI" required>
            </div>

            <div class="input-box">
                <label>Classes</label>
                <select name="Classes" required>
                    <option value="">Select Class</option>
                    <option value="0">Not Fire</option>
                    <option value="1">Fire</option>
                </select>
            </div>

            <div class="input-box">
                <label>Region</label>
                <select name="Region" required>
                    <option value="">Select Region</option>
                    <option value="0">Bejaia Region</option>
                    <option value="1">Sidi-Bel Abbes Region</option>
                </select>
            </div>

            <div class="button-box">
                <button type="submit">Predict FWI</button>
            </div>

        </form>

       
        <div class="result">
            Predicted FWI Value: {{ results }}
        </div>
        

      

    </div>

</body>
</html>
